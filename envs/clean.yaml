name: clean
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy<2
  - scipy
  - pandas
  - scikit-learn
  - biopython
  - tqdm
  - git
  - unzip
  - libstdcxx-ng
  - hmmer>=3.3
  - mmseqs2
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch==1.11.0
      - fair-esm==1.0.2
      - gdown
